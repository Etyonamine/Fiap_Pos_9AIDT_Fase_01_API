services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiap_fase01_api
    ports:
      - "8088:5000"
    volumes:
      - ./model:/app/model:ro
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - API_HOST=localhost:8088
    restart: unless-stopped
